services:
  backend:
    build: ./backend
    container_name: relt-backend
    restart: unless-stopped
    volumes:
      - relt-data:/app/data
    env_file:
      - .env
    expose:
      - "8000"
    extra_hosts:
      - "host-gateway:host-gateway"

  frontend:
    build: ./frontend
    container_name: relt-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  relt-data:
